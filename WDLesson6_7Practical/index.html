<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>WD Lesson 6.7 Practical</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
    <script src="script.js"></script>
   </head>
  <body onload="init()">
    <div id="banner" class="container center">
      <div style="text-align:center">
          <h1>Motor Vehicle Collisions-Crashes</h1>
      </div>
    </div>
    <div class="container subbanner">
      <div class="card">
        <h3>Serach By Collision ID</h3>
        <input type="text" id="collision_id" placeholder="Enter Collision ID">
        <hr></hr>
        <a class="button" onclick="filterByCollision_id()"> Search </a>
      </div>
      <div class="card">
        <h3>Serach By Crash Date</h3>
        <input type="text" id="date" placeholder="Enter Date">
        <hr></hr>
        <a class="button" onclick="filterByCrash_date()"> Search </a>
      </div>
      <div class="card">
        <h3>Serach By Crash Time</h3>
        <input type="text" id="time" placeholder="Enter Time">
        <hr></hr>
        <a class="button" onclick="filterByCrash_time()"> Search </a>
      </div>
      <div class="card">
        <h3>Serach By Borough</h3>
        <input type="text" id="borough" placeholder="Enter Date">
        <hr></hr>
        <a class="button" onclick="filterByBorough()"> Search </a>
      </div>
      <div class="card">
        <h3>Serach By Contribute Factor #1</h3>
        <input type="text" id="contribute_factor1" placeholder="Enter Contribute Factor">
        <hr></hr>
        <a class="button" onclick="filterByContribute_fator1()"> Search </a>
      </div>
      <div class="card">
        <h3>Serach By Contribute Factor #2</h3>
        <input type="text" id="contribute_factor2" placeholder="Enter Contribute Factor">
        <hr></hr>
        <a class="button" onclick="filterByContribute_fator1()"> Search </a>
      </div>
      <div class="card">
        <h3>Serach By Contribute Factor #3</h3>
        <input type="text" id="contribute_factor3" placeholder="Enter Contribute Factor">
        <hr></hr>
        <a class="button" onclick="filterByContribute_fator1()"> Search </a>
      </div>
    </div>
    <div id="output" class="container">
      

    </div>

    <div id="footer" class="container center">
      <h3>Lesson 6.7 Practical</h3>
    </div>  
  </body>
</html>
